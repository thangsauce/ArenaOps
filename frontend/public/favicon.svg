<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      @font-face {
        font-family: 'BebasAO';
        src: url('data:font/woff2;base64,') format('woff2');
      }
      .trail { fill: none; stroke: #e8ff47; stroke-linecap: round; }
      .ao    { fill: #e8ff47; font-family: 'BebasAO', sans-serif; font-size: 18px; }
      @media (prefers-color-scheme: light) {
        .trail { stroke: #4a5700; }
        .ao    { fill: #4a5700; }
      }
    </style>
  </defs>

  <!-- motion speed trail -->
  <line class="trail" x1="1" y1="13" x2="6"  y2="13" stroke-width="1.4" opacity="0.35"/>
  <line class="trail" x1="1" y1="16" x2="8"  y2="16" stroke-width="2"   opacity="0.65"/>
  <line class="trail" x1="1" y1="19" x2="6"  y2="19" stroke-width="1.4" opacity="0.35"/>

  <!-- AO in Bebas Neue -->
  <text class="ao" x="9" y="24" letter-spacing="-0.5">AO</text>
</svg>
